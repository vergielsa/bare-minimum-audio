  <style>
    /* Lightbox overlay */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 88vh;
      object-fit: contain;
      border: none;
    }
    .lightbox-close {
      position: absolute;
      top: 1.5rem;
      right: 2rem;
      font-size: 2rem;
      color: #fff;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
    }
    .lightbox-prev,
    .lightbox-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2rem;
      color: #fff;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0 1.5rem;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .lightbox-prev:hover,
    .lightbox-next:hover { opacity: 1; }
    .lightbox-prev { left: 0; }
    .lightbox-next { right: 0; }
  </style>
</head>

  <!-- ── PAGE CONTENT ── -->

    <!--

      Name them portfolio-1.jpg through portfolio-8.jpg (or more) and place in images/.
      You had at least 8 photos: outdoor stages, covered pavilions, live shows, etc.

      TO ADD MORE PHOTOS: Just copy one of the <div class="grid-item"> blocks below
      and update the src and alt. The grid handles the rest automatically.
    -->

  <script>
    // Mobile nav
    const hamburger = document.getElementById('hamburger');
    const mobileNav = document.getElementById('mobile-nav');
    hamburger.addEventListener('click', () => mobileNav.classList.toggle('open'));

    // Lightbox
    const items    = Array.from(document.querySelectorAll('.grid-item img'));
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lb-img');
    let current    = 0;

    function openLightbox(index) {
      current = index;
      lbImg.src = items[current].src;
      lbImg.alt = items[current].alt;
      lightbox.classList.add('open');
    }

    function closeLightbox() { lightbox.classList.remove('open'); }

    function showNext() {
      current = (current + 1) % items.length;
      lbImg.src = items[current].src;
      lbImg.alt = items[current].alt;
    }

    function showPrev() {
      current = (current - 1 + items.length) % items.length;
      lbImg.src = items[current].src;
      lbImg.alt = items[current].alt;
    }

    document.querySelectorAll('.grid-item').forEach((item, i) => {
      item.addEventListener('click', () => openLightbox(i));
    });

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-next').addEventListener('click', showNext);
    document.getElementById('lb-prev').addEventListener('click', showPrev);

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'ArrowRight') showNext();
      if (e.key === 'ArrowLeft')  showPrev();
      if (e.key === 'Escape')     closeLightbox();
    });
  </script>
